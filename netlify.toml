[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["@libsql/client", "@libsql/client/http", "@libsql/linux-x64-gnu", "@libsql/darwin-arm64"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/uploads/*"
  to = "/.netlify/functions/uploads/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  # netlify dev menjalankan frontend (Vite) dan otomatis expose functions di port 8888
  # Vite akan mendeteksi NETLIFY=true dan proxy ke port 8888
  command = "npm run dev:frontend"
  targetPort = 5173
  port = 8888
  framework = "#custom"
  autoLaunch = false
